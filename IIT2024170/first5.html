<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Movie List</title>
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #121212;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-direction: column;
        }
        .container {
            max-width: 800px;
            background: #1e1e1e;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0px 0px 20px rgba(255, 255, 255, 0.1);
            text-align: center;
        }
        h2 {
            color: #32cdbb;
            margin-bottom: 20px;
        }
        ul {
            list-style: none;
            padding: 0;
        }
        li {
            background: #282828;
            margin: 10px 0;
            padding: 15px;
            border-radius: 5px;
            font-size: 18px;
            transition: 0.3s;
        }
        li:hover {
            background: #47f9ff;
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Anime Movie List</h2>
        <ul>
            <li>Your Name (Kimi no Na wa)</li>
            <li>Spirited Away</li>
            <li>A Silent Voice</li>
            <li>Akira</li>
            <li>Your Lie in April</li>
            <li>Weathering With You</li>
            <li>Howl's Moving Castle</li>
            <li>Demon Slayer: Mugen Train</li>
            <li>Ghost in the Shell</li>
            <li>Grave of the Fireflies</li>
        </ul>
    </div>
</body>
</html>
