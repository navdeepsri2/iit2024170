<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Movie Suggestions</title>
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #121212;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-direction: column;
        }
        .container {
            max-width: 800px;
            background: #1e1e1e;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0px 0px 20px rgba(255, 255, 255, 0.1);
            text-align: center;
        }
        h2 {
            color: #8fd6fc;
            margin-bottom: 20px;
        }
        .suggestion {
            margin: 20px 0;
            padding: 20px;
            background: #282828;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
        }
        .form-group {
            margin: 15px 0;
            text-align: left;
        }
        input, textarea {
            width: 100%;
            padding: 12px;
            margin-top: 5px;
            border: none;
            border-radius: 8px;
            background: #ffffff;
            color: white;
            font-size: 16px;
        }
        button {
            background: #47ddff;
            color: white;
            padding: 12px 18px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 18px;
            transition: 0.3s;
        }
        button:hover {
            background: #18dae8;
            transform: scale(1.05);
        }
    </style>
    <script>
        function suggestMovie() {
            const suggestions = [
                "Your Name (Kimi no Na wa) - A beautiful romance with stunning animation.",
                "Spirited Away - A magical journey filled with adventure and fantasy.",
                "A Silent Voice - A touching story about redemption and friendship.",
                "Akira - A classic cyberpunk anime with breathtaking visuals.",
                "Your Lie in April - A heartfelt drama about music and love."
            ];
            
            const randomSuggestion = suggestions[Math.floor(Math.random() * suggestions.length)];
            document.getElementById("suggestion-box").innerText = randomSuggestion;
        }
    </script>
</head>
<body>
    <div class="container">
        <h2>Anime Movie Suggestions</h2>
        <div class="suggestion" id="suggestion-box">Click below to get a movie suggestion!</div>
        <button onclick="suggestMovie()">Get Suggestion</button>
        <h3>Suggest an Anime Movie</h3>
        <form>
            <div class="form-group">
                <label for="name">Your Name:</label>
                <input type="text" id="name" name="name" required>
            </div>
            <div class="form-group">
                <label for="movie">Anime Movie Name:</label>
                <input type="text" id="movie" name="movie" required>
            </div>
         
            </div>
            <button type="submit">Submit Suggestion</button>
        </form>
    </div>
</body>
</html>
